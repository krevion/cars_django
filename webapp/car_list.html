<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .car-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .car-card h3 { margin-top: 0; }
        .car-card img { max-width: 100px; height: auto; margin-right: 10px; float: left; }
        .car-card::after { content: ""; display: table; clear: both; }
        .actions a { margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Car List</h1>
    <p><a href="{% url 'car_create' %}">Add New Car</a></p>
    {% for car in cars %}
        <div class="car-card">
            {% if car.image %}<img src="{{ car.image }}" alt="{{ car.name }}">{% endif %}
            <h3><a href="{% url 'car_detail' car.pk %}">{{ car.name }}</a></h3>
            <p>{{ car.description }}</p>
            <div class="actions">
                <a href="{% url 'car_update' car.pk %}">Edit</a>
                <a href="{% url 'car_delete' car.pk %}">Delete</a>
            </div>
        </div>
    {% empty %}
        <p>No cars available.</p>
    {% endfor %}
</body>
</html>
