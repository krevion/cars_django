<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Delete</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .delete-confirm { max-width: 500px; margin: 0 auto; padding: 20px; border: 1px solid #dc3545; border-radius: 5px; background-color: #f8d7da; color: #721c24; }
        .delete-confirm h1 { color: #dc3545; }
        .delete-confirm button {
            background-color: #dc3545;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        .delete-confirm button:hover { background-color: #c82333; }
        .delete-confirm a {
            background-color: #6c757d;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
        }
        .delete-confirm a:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div class="delete-confirm">
        <h1>Confirm Delete</h1>
        <p>Are you sure you want to delete "{{ car.name }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Yes, delete</button>
            <a href="{% url 'car_detail' car.pk %}">Cancel</a>
        </form>
    </div>
</body>
</html>
